name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Test
        run: scripts/test.sh

      - name: Build release app
        run: scripts/build-app.sh release

      - name: Verify Apple silicon architecture
        run: test "$(lipo -archs '.build/Call Recorder.app/Contents/MacOS/CallRecorder')" = arm64
