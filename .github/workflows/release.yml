name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the v prefix
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish Apple silicon DMG
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Validate version
        run: |
          if ! printf '%s\n' "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Version must look like 1.2.3" >&2
            exit 64
          fi

      - name: Test
        run: scripts/test.sh

      - name: Build release app
        env:
          APP_VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: scripts/build-app.sh release

      - name: Package DMG
        run: scripts/package-dmg.sh "$RELEASE_VERSION"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v$RELEASE_VERSION"
          dmg=".build/releases/Call-Recorder-$RELEASE_VERSION-Apple-Silicon.dmg"
          checksum="$dmg.sha256"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists" >&2
            exit 1
          fi
          notes=$'Apple silicon release for macOS 14.2 or later.\n\n'
          notes+=$'This build is not notarized. On first launch, macOS may require System Settings → Privacy & Security → Open Anyway.'
          gh release create "$tag" "$dmg" "$checksum" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Call Recorder $RELEASE_VERSION" \
            --notes "$notes"
          gh release edit "$tag" --draft=false
